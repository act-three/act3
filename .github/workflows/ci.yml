name: CI

on:
    pull_request:
    push:
        branches: [main]

# For PR pushes, cancel any in-flight run on the same branch so we
# don't burn CI minutes on a superseded commit. Pushes to main always
# run to completion.
concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
    GOEXPERIMENT: jsonv2
    PRODTAGS: prod,nodynamic,buildinfoembed

jobs:
    ci:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
              with:
                  # Full history so frozencheck can reach the merge base.
                  fetch-depth: 0

            - uses: actions/setup-go@v5
              with:
                  # setup-go can't resolve the "1.27rc1" toolchain
                  # directive in go.mod; pin the release candidate
                  # explicitly. Revert to go-version-file once Go 1.27
                  # ships.
                  go-version: 1.27.0-rc.1
                  # setup-go keys its cache on go.sum alone, so all
                  # jobs collide on one key and only the first to
                  # finish saves — leaving the others (notably the
                  # race-instrumented build) cold on every run. Cache
                  # per job instead.
                  cache: false

            - name: Cache Go modules and build cache
              uses: actions/cache@v4
              with:
                  path: |
                      ~/go/pkg/mod
                      ~/.cache/go-build
                  key: go-${{ github.job }}-${{ hashFiles('go.mod', 'go.sum') }}
                  restore-keys: go-${{ github.job }}-

            - name: Install sqlc
              run: |
                  mkdir -p "$HOME/.local/bin"
                  curl -fsSL https://github.com/sqlc-dev/sqlc/releases/download/v1.30.0/sqlc_1.30.0_linux_amd64.tar.gz |
                      tar -xz -C "$HOME/.local/bin" sqlc
                  echo "$HOME/.local/bin" >> "$GITHUB_PATH"

            - name: Install goimports
              run: go install golang.org/x/tools/cmd/goimports@v0.44.0

            - name: Install shfmt
              run: go install mvdan.cc/sh/v3/cmd/shfmt@latest

            - name: Install dprint
              run: |
                  curl -fsSL https://dprint.dev/install.sh | sh -s 0.54.0
                  echo "$HOME/.dprint/bin" >> "$GITHUB_PATH"

            - name: Cache dprint plugins
              uses: actions/cache@v4
              with:
                  path: ~/.cache/dprint
                  key: dprint-${{ hashFiles('dprint.json') }}

            # Cheap checks first, so an obvious format slip fails fast
            # before the slower steps run.

            - name: gofmt
              run: |
                  unformatted=$(gofmt -l .)
                  if [ -n "$unformatted" ]; then
                    echo "the following files are not gofmt-clean:"
                    echo "$unformatted"
                    echo
                    echo "run: gofmt -w ."
                    exit 1
                  fi

            - name: dprint check
              run: dprint check

            - name: buildinfo placeholders
              run: |
                  for f in date changeid commitid log; do
                    echo placeholder >buildinfo/embed-$f.txt
                  done

            - name: go vet
              run: |
                  go vet ./...
                  go vet -tags $PRODTAGS ./...

            - name: act3vet
              run: |
                  go build -o /tmp/act3vet ./cmd/act3vet
                  go vet -vettool=/tmp/act3vet ./...
                  go vet -tags $PRODTAGS -vettool=/tmp/act3vet ./...

            - name: go-check-sumtype
              run: go tool go-check-sumtype ./...

            # frozen.txt records published schema updates and may only
            # grow: existing entries are immutable, and each newly-frozen
            # update must carry an attestation report. Compare against the
            # merge base so a PR is judged from where it branched, not
            # the moving tip of main.
            - name: frozen.txt append-only + attestation
              run: |
                  if [ "$GITHUB_EVENT_NAME" = pull_request ]; then
                    base=$(git merge-base '${{ github.event.pull_request.base.sha }}' '${{ github.event.pull_request.head.sha }}')
                  else
                    base='${{ github.event.before }}'
                  fi
                  git show "$base:database/frozen.txt" | go run ./cmd/frozencheck database/frozen.txt

                  # Committed reports are immutable, like frozen.txt
                  # entries: a PR may add report files but never modify or
                  # delete one. Otherwise it could lower an earlier
                  # report's row count to weaken the floor that the
                  # attestation check reads from the working tree.
                  changed=$(git diff --diff-filter=MD --name-only "$base" HEAD -- database/report/)
                  if [ -n "$changed" ]; then
                    echo "error: attestation reports are immutable; do not modify or delete:" >&2
                    echo "$changed" >&2
                    exit 1
                  fi

            - name: go mod tidy
              run: |
                  go mod tidy
                  if ! git diff --quiet go.mod go.sum; then
                    echo "go.mod or go.sum is not tidy:"
                    git diff go.mod go.sum
                    exit 1
                  fi

            - name: go generate
              run: |
                  go generate ./...
                  if ! git diff --quiet; then
                    echo "go generate produced changes — generated files are out of date:"
                    git status --short
                    git diff
                    exit 1
                  fi

            - name: go build
              run: go build ./...

            - name: go test
              run: go test -short ./...

            # The prod build tag compiles in the unfrozen-schema
            # backstop (database/schema_prod.go). Exercise it on just
            # the database package so the rest of the suite doesn't
            # re-run under -tags prod.
            - name: go test (prod backstop)
              run: go test -tags prod ./database/

    # Race-detector pass on the same short subset (skips ffmpeg).
    # Not required to land: race regressions don't block, but they
    # show up as a failing check.
    test-race:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-go@v5
              with:
                  go-version: 1.27.0-rc.1 # see ci job above
                  cache: false # see ci job above

            - name: Cache Go modules and build cache
              uses: actions/cache@v4
              with:
                  path: |
                      ~/go/pkg/mod
                      ~/.cache/go-build
                  key: go-${{ github.job }}-${{ hashFiles('go.mod', 'go.sum') }}
                  restore-keys: go-${{ github.job }}-

            - name: go test -race -short
              run: go test -race -short ./...

    # Full suite including the ffmpeg-driven tests, no race.
    # Relies on the ffmpeg pre-installed on ubuntu-latest runners.
    # Not required to land.
    test-full:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-go@v5
              with:
                  go-version: 1.27.0-rc.1 # see ci job above
                  cache: false # see ci job above

            - name: Cache Go modules and build cache
              uses: actions/cache@v4
              with:
                  path: |
                      ~/go/pkg/mod
                      ~/.cache/go-build
                  key: go-${{ github.job }}-${{ hashFiles('go.mod', 'go.sum') }}
                  restore-keys: go-${{ github.job }}-

            - name: go test (full)
              run: go test ./...
